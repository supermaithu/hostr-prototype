<style>
:root {
  --bg: #0a0b14;
  --bg2: #12131f;
  --bg3: #1a1b2e;
  --glass: rgba(255,255,255,0.04);
  --glass2: rgba(255,255,255,0.07);
  --glass3: rgba(255,255,255,0.1);
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.12);
  --text: #ffffff;
  --text2: rgba(255,255,255,0.7);
  --text3: rgba(255,255,255,0.4);
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --accent-glow: rgba(108,92,231,0.3);
  --green: #00b894;
  --red: #e17055;
  --orange: #fdcb6e;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

#root { min-height: 100vh; display: flex; flex-direction: column; }

.glass {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.glass:hover { border-color: var(--border2); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 15px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s;
  text-decoration: none;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary {
  background: var(--accent); color: white;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.btn-primary:hover:not(:disabled) { background: #7c6ef7; transform: translateY(-1px); box-shadow: 0 6px 24px var(--accent-glow); }
.btn-secondary {
  background: var(--glass2); color: var(--text); border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--glass3); border-color: var(--border2); }
.btn-ghost { background: transparent; color: var(--text2); }
.btn-ghost:hover { color: var(--text); background: var(--glass); }
.btn-full { width: 100%; }
.btn-sm { padding: 8px 16px; font-size: 13px; }
.btn-lg { padding: 16px 32px; font-size: 17px; }

.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-group label { font-size: 13px; font-weight: 500; color: var(--text2); }
.input {
  width: 100%; padding: 14px 16px;
  background: var(--glass); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: inherit; font-size: 15px;
  transition: all 0.2s; outline: none;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.input::placeholder { color: var(--text3); }
textarea.input { resize: vertical; min-height: 80px; }

.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  background: rgba(10,11,20,0.85); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 100;
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; color: var(--text); text-decoration: none; cursor: pointer; }
.nav-logo span { font-size: 20px; }
.nav-actions { display: flex; gap: 8px; align-items: center; }
.nav-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.nav-avatar:hover { background: #7c6ef7; }

.auth-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
}
.auth-page::before {
  content: ''; position: absolute;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  top: -200px; right: -100px; opacity: 0.5; pointer-events: none;
}
.auth-page::after {
  content: ''; position: absolute;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(162,155,254,0.15) 0%, transparent 70%);
  bottom: -150px; left: -100px; opacity: 0.5; pointer-events: none;
}
.auth-card {
  width: 100%; max-width: 420px; padding: 40px;
  position: relative; z-index: 1;
  animation: fadeUp 0.5s ease;
}
.auth-card h1 { font-family: 'Instrument Serif', serif; font-size: 32px; margin-bottom: 8px; }
.auth-card .subtitle { color: var(--text2); margin-bottom: 32px; font-size: 15px; }
.auth-form { display: flex; flex-direction: column; gap: 20px; }
.auth-footer { text-align: center; margin-top: 24px; font-size: 14px; color: var(--text2); }
.auth-footer a { color: var(--accent2); cursor: pointer; text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
.auth-error {
  background: rgba(225,112,85,0.1); border: 1px solid rgba(225,112,85,0.3);
  border-radius: var(--radius-sm); padding: 12px 16px;
  color: var(--red); font-size: 14px;
}

.dashboard { padding: 32px 24px; max-width: 900px; margin: 0 auto; width: 100%; }
.dash-header { margin-bottom: 32px; }
.dash-header h1 { font-family: 'Instrument Serif', serif; font-size: 28px; margin-bottom: 4px; }
.dash-header p { color: var(--text2); font-size: 15px; }
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

.exchange-card {
  padding: 24px; cursor: pointer; transition: all 0.25s;
  position: relative; overflow: hidden;
}
.exchange-card:hover { transform: translateY(-2px); border-color: var(--accent); }
.exchange-card .emoji { font-size: 32px; margin-bottom: 12px; display: block; }
.exchange-card h3 { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.exchange-card .meta { display: flex; flex-wrap: wrap; gap: 12px; color: var(--text2); font-size: 13px; }
.exchange-card .meta span { display: flex; align-items: center; gap: 4px; }

.create-card {
  padding: 24px; cursor: pointer; transition: all 0.25s;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 180px; border-style: dashed;
}
.create-card:hover { border-color: var(--accent); background: var(--glass2); }
.create-card .plus { font-size: 32px; color: var(--accent2); margin-bottom: 8px; }
.create-card span { color: var(--text2); font-size: 14px; }

.empty-state { text-align: center; padding: 60px 24px; }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 20px; margin-bottom: 8px; }
.empty-state p { color: var(--text2); font-size: 15px; margin-bottom: 24px; max-width: 360px; margin-left: auto; margin-right: auto; }

.create-page { padding: 32px 24px; max-width: 600px; margin: 0 auto; width: 100%; }
.create-page h1 { font-family: 'Instrument Serif', serif; font-size: 28px; margin-bottom: 8px; }
.create-page .subtitle { color: var(--text2); margin-bottom: 32px; }
.create-form { display: flex; flex-direction: column; gap: 24px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.emoji-picker { display: flex; gap: 8px; flex-wrap: wrap; }
.emoji-opt {
  width: 44px; height: 44px; border-radius: var(--radius-xs);
  background: var(--glass); border: 2px solid transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; transition: all 0.2s;
}
.emoji-opt:hover { background: var(--glass2); }
.emoji-opt.active { border-color: var(--accent); background: var(--glass3); }
.form-actions { display: flex; gap: 12px; margin-top: 8px; }

.detail-page { padding: 32px 24px; max-width: 800px; margin: 0 auto; width: 100%; }
.detail-header { margin-bottom: 32px; }
.detail-header .back { color: var(--text2); font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px; }
.detail-header .back:hover { color: var(--text); }
.detail-header h1 { font-family: 'Instrument Serif', serif; font-size: 28px; display: flex; align-items: center; gap: 12px; }
.detail-header .meta-row { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; color: var(--text2); font-size: 14px; }
.detail-header .meta-row span { display: flex; align-items: center; gap: 6px; }

.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 28px; }
.stat-card { padding: 20px; text-align: center; }
.stat-card .value { font-size: 24px; font-weight: 700; color: var(--text); }
.stat-card .label { font-size: 12px; color: var(--text2); margin-top: 4px; }

.invite-box {
  padding: 20px; margin-bottom: 28px;
  display: flex; align-items: center; gap: 16px;
}
.invite-url {
  flex: 1; padding: 10px 14px; background: var(--bg);
  border-radius: var(--radius-xs); font-size: 13px; color: var(--text2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-family: 'DM Sans', monospace;
}

.section-title {
  font-size: 16px; font-weight: 600; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}

.participants-list { display: flex; flex-direction: column; gap: 8px; }
.participant-row {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius-sm);
  background: var(--glass); border: 1px solid var(--border);
}
.participant-row .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600; flex-shrink: 0;
}
.participant-row .info { flex: 1; min-width: 0; }
.participant-row .name { font-size: 14px; font-weight: 500; }
.participant-row .role { font-size: 12px; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.badge {
  font-size: 11px; padding: 3px 8px; border-radius: 20px;
  font-weight: 500; white-space: nowrap;
}
.badge-organizer { background: rgba(108,92,231,0.2); color: var(--accent2); }
.badge-joined { background: rgba(0,184,148,0.15); color: var(--green); }

.join-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px; position: relative; overflow: hidden;
}
.join-page::before {
  content: ''; position: absolute;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  top: -200px; left: 50%; transform: translateX(-50%); opacity: 0.4; pointer-events: none;
}
.join-card { width: 100%; max-width: 440px; padding: 40px; text-align: center; position: relative; z-index: 1; }
.join-card .emoji { font-size: 48px; margin-bottom: 16px; }
.join-card h1 { font-family: 'Instrument Serif', serif; font-size: 28px; margin-bottom: 8px; }
.join-card .desc { color: var(--text2); font-size: 15px; margin-bottom: 8px; }
.join-card .host { color: var(--text3); font-size: 13px; margin-bottom: 28px; }
.join-details { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
.join-detail { text-align: center; }
.join-detail .val { font-size: 18px; font-weight: 600; }
.join-detail .lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

.loading-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.spinner {
  width: 32px; height: 32px; border: 3px solid var(--glass3);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  padding: 12px 24px; border-radius: var(--radius-sm);
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text); font-size: 14px; z-index: 1000;
  animation: fadeUp 0.3s ease;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}

.dropdown-menu {
  position: absolute; top: 100%; right: 0; margin-top: 8px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); padding: 8px; min-width: 180; z-index: 200;
  animation: fadeUp 0.2s ease;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .nav { padding: 12px 16px; }
  .dashboard, .create-page, .detail-page { padding: 20px 16px; }
  .auth-card { padding: 28px 24px; }
  .form-row { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .invite-box { flex-direction: column; align-items: stretch; }
  .join-card { padding: 28px 24px; }
  .form-actions { flex-direction: column; }
  .dash-grid { grid-template-columns: 1fr; }
}
</style>

<script type="text/babel">
const { useState, useEffect, useCallback, createContext, useContext } = React;

// ============================================================
// SUPABASE CONFIG
// ============================================================
const SUPABASE_URL = "https://atfofxrtqwdrtbmdifou.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0Zm9meHJ0cXdkcnRibWRpZm91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjE4ODYsImV4cCI6MjA4ODMzNzg4Nn0.9eVd7HAi7I-qQV3FDcP6ecc9lyxSMPRN7Gj7q9lacDI";

// ============================================================
// MINIMAL SUPABASE CLIENT
// ============================================================
const supabase = {
  auth: {
    async signUp({ email, password, options }) {
      const res = await fetch(SUPABASE_URL + "/auth/v1/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password, data: options?.data || {} }),
      });
      const data = await res.json();
      if (!res.ok) return { data: null, error: data };
      if (data.access_token) localStorage.setItem("sb_token", data.access_token);
      return { data, error: null };
    },
    async signInWithPassword({ email, password }) {
      const res = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: { "Content-Type": "application/json", apikey: SUPABASE_ANON_KEY },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) return { data: null, error: data };
      if (data.access_token) localStorage.setItem("sb_token", data.access_token);
      return { data, error: null };
    },
    async getUser() {
      const token = localStorage.getItem("sb_token");
      if (!token) return { data: { user: null }, error: null };
      const res = await fetch(SUPABASE_URL + "/auth/v1/user", {
        headers: { Authorization: "Bearer " + token, apikey: SUPABASE_ANON_KEY },
      });
      if (!res.ok) { localStorage.removeItem("sb_token"); return { data: { user: null }, error: "Not authenticated" }; }
      const user = await res.json();
      return { data: { user }, error: null };
    },
    async signOut() {
      localStorage.removeItem("sb_token");
      return { error: null };
    },
  },
  from(table) {
    const token = localStorage.getItem("sb_token");
    const headers = {
      "Content-Type": "application/json",
      apikey: SUPABASE_ANON_KEY,
      Authorization: "Bearer " + token,
      Prefer: "return=representation",
    };
    const url = SUPABASE_URL + "/rest/v1/" + table;

    const chain = {
      _select: "*", _filters: [], _order: "", _limit: null, _single: false,
      select(cols) { chain._select = cols || "*"; return chain; },
      eq(col, val) { chain._filters.push(col + "=eq." + val); return chain; },
      order(col, opts) { chain._order = col + "." + ((opts?.ascending !== false) ? "asc" : "desc"); return chain; },
      limit(n) { chain._limit = n; return chain; },
      single() { chain._single = true; return chain; },
      async then(resolve) {
        const h = {...headers};
        if (chain._single) h["Accept"] = "application/vnd.pgrst.object+json";
        let u = url + "?select=" + encodeURIComponent(chain._select);
        chain._filters.forEach(function(f) { u += "&" + f; });
        if (chain._order) u += "&order=" + chain._order;
        if (chain._limit) u += "&limit=" + chain._limit;
        try {
          const res = await fetch(u, { headers: h });
          if (!res.ok) { const e = await res.json(); resolve({ data: null, error: e }); return; }
          resolve({ data: await res.json(), error: null });
        } catch(err) { resolve({ data: null, error: err }); }
      },
      insert(rows) {
        return {
          select(cols) {
            return {
              single() {
                return {
                  async then(resolve) {
                    try {
                      const res = await fetch(url + "?select=" + encodeURIComponent(cols || "*"), {
                        method: "POST",
                        headers: {...headers, Accept: "application/vnd.pgrst.object+json"},
                        body: JSON.stringify(Array.isArray(rows) ? rows : [rows]),
                      });
                      if (!res.ok) { resolve({ data: null, error: await res.json() }); return; }
                      resolve({ data: await res.json(), error: null });
                    } catch(err) { resolve({ data: null, error: err }); }
                  }
                };
              },
              async then(resolve) {
                try {
                  const res = await fetch(url + "?select=" + encodeURIComponent(cols || "*"), {
                    method: "POST", headers,
                    body: JSON.stringify(Array.isArray(rows) ? rows : [rows]),
                  });
                  if (!res.ok) { resolve({ data: null, error: await res.json() }); return; }
                  resolve({ data: await res.json(), error: null });
                } catch(err) { resolve({ data: null, error: err }); }
              }
            };
          },
          async then(resolve) {
            try {
              const res = await fetch(url, {
                method: "POST", headers,
                body: JSON.stringify(Array.isArray(rows) ? rows : [rows]),
              });
              if (!res.ok) { resolve({ data: null, error: await res.json() }); return; }
              resolve({ data: await res.json(), error: null });
            } catch(err) { resolve({ data: null, error: err }); }
          }
        };
      },
    };
    return chain;
  },
};

// ============================================================
// AUTH CONTEXT
// ============================================================
const AuthCtx = createContext();

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);

  const loadProfile = useCallback(async (u) => {
    if (!u) { setProfile(null); return; }
    const { data } = await supabase.from("profiles").select("*").eq("id", u.id).single();
    setProfile(data);
  }, []);

  useEffect(() => {
    (async () => {
      const { data: { user: u } } = await supabase.auth.getUser();
      setUser(u);
      if (u) await loadProfile(u);
      setLoading(false);
    })();
  }, []);

  const signUp = async (email, password, name) => {
    const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { display_name: name } } });
    if (error) return { error };
    const u = data.user || data;
    if (u?.id) {
      await supabase.from("profiles").insert({ id: u.id, display_name: name, email }).select("*").single();
      setUser(u);
      await loadProfile(u);
    }
    return { data, error: null };
  };

  const signIn = async (email, password) => {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) return { error };
    const u = data.user || data;
    setUser(u);
    await loadProfile(u);
    return { data, error: null };
  };

  const signOut = async () => {
    await supabase.auth.signOut();
    setUser(null);
    setProfile(null);
  };

  return (
    <AuthCtx.Provider value={{ user, profile, loading, signUp, signIn, signOut }}>
      {children}
    </AuthCtx.Provider>
  );
}

const useAuth = () => useContext(AuthCtx);

// ============================================================
// UTILITIES
// ============================================================
function initials(name) {
  if (!name) return "?";
  return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

function formatDate(d) {
  if (!d) return "TBD";
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function daysUntil(d) {
  if (!d) return null;
  const diff = Math.ceil((new Date(d + "T00:00:00") - new Date()) / (1000 * 60 * 60 * 24));
  if (diff < 0) return "Past";
  if (diff === 0) return "Today!";
  if (diff === 1) return "Tomorrow";
  return diff + " days";
}

function useToast() {
  const [msg, setMsg] = useState(null);
  const show = (m) => { setMsg(m); setTimeout(() => setMsg(null), 2800); };
  const Toast = msg ? <div className="toast">{msg}</div> : null;
  return { show, Toast };
}

// ============================================================
// LOGIN
// ============================================================
function LoginScreen({ onNavigate }) {
  const { signIn } = useAuth();
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!email || !password) { setError("Please fill in all fields"); return; }
    setError(null); setLoading(true);
    const { error: e } = await signIn(email, password);
    setLoading(false);
    if (e) { setError(e.error_description || e.message || e.msg || "Invalid email or password"); return; }
    onNavigate("dashboard");
  };

  return (
    <div className="auth-page">
      <div className="auth-card glass">
        <h1>Welcome back</h1>
        <p className="subtitle">Sign in to your Hostr account</p>
        {error && <div className="auth-error">{error}</div>}
        <div className="auth-form">
          <div className="input-group">
            <label>Email</label>
            <input className="input" type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} />
          </div>
          <div className="input-group">
            <label>Password</label>
            <input className="input" type="password" placeholder="••••••••" value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSubmit()} />
          </div>
          <button className="btn btn-primary btn-full btn-lg" onClick={handleSubmit} disabled={loading}>
            {loading ? "Signing in…" : "Sign in"}
          </button>
        </div>
        <p className="auth-footer">
          Don't have an account? <a onClick={() => onNavigate("signup")}>Sign up</a>
        </p>
      </div>
    </div>
  );
}

// ============================================================
// SIGNUP
// ============================================================
function SignupScreen({ onNavigate }) {
  const { signUp } = useAuth();
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!name.trim()) { setError("Name is required"); return; }
    if (!email) { setError("Email is required"); return; }
    if (password.length < 6) { setError("Password must be at least 6 characters"); return; }
    setError(null); setLoading(true);
    const { error: e } = await signUp(email, password, name.trim());
    setLoading(false);
    if (e) { setError(e.error_description || e.message || e.msg || "Could not create account"); return; }
    onNavigate("dashboard");
  };

  return (
    <div className="auth-page">
      <div className="auth-card glass">
        <h1>Create your account</h1>
        <p className="subtitle">Start hosting better gift exchanges</p>
        {error && <div className="auth-error">{error}</div>}
        <div className="auth-form">
          <div className="input-group">
            <label>Your name</label>
            <input className="input" type="text" placeholder="Jamie Chen" value={name} onChange={e => setName(e.target.value)} />
          </div>
          <div className="input-group">
            <label>Email</label>
            <input className="input" type="email" placeholder="you@example.com" value={email} onChange={e => setEmail(e.target.value)} />
          </div>
          <div className="input-group">
            <label>Password</label>
            <input className="input" type="password" placeholder="At least 6 characters" value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === "Enter" && handleSubmit()} />
          </div>
          <button className="btn btn-primary btn-full btn-lg" onClick={handleSubmit} disabled={loading}>
            {loading ? "Creating account…" : "Get started"}
          </button>
        </div>
        <p className="auth-footer">
          Already have an account? <a onClick={() => onNavigate("login")}>Sign in</a>
        </p>
      </div>
    </div>
  );
}

// ============================================================
// DASHBOARD
// ============================================================
function DashboardScreen({ onNavigate }) {
  const { user, profile } = useAuth();
  const [exchanges, setExchanges] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!user) return;
    (async () => {
      // Get exchanges user organized
      const { data: organized } = await supabase.from("exchanges").select("*").eq("organizer_id", user.id).order("created_at", { ascending: false });

      // Get exchanges user participated in
      const { data: parts } = await supabase.from("participants").select("exchange_id").eq("user_id", user.id);
      const partIds = (parts || []).map(p => p.exchange_id);

      let joined = [];
      for (const eid of partIds) {
        if (organized && organized.find(o => o.id === eid)) continue;
        const { data: ex } = await supabase.from("exchanges").select("*").eq("id", eid).single();
        if (ex) joined.push(ex);
      }

      setExchanges([...(organized || []), ...joined]);
      setLoading(false);
    })();
  }, [user]);

  const firstName = profile?.display_name?.split(" ")[0] || "there";

  return (
    <div className="dashboard" style={{ animation: "fadeUp 0.4s ease" }}>
      <div className="dash-header">
        <h1>Hey {firstName} 👋</h1>
        <p>{exchanges.length === 0 ? "Create your first exchange to get started." : "You have " + exchanges.length + " exchange" + (exchanges.length > 1 ? "s" : "") + "."}</p>
      </div>

      {loading ? (
        <div style={{ display: "flex", justifyContent: "center", padding: 60 }}><div className="spinner"></div></div>
      ) : exchanges.length === 0 ? (
        <div className="empty-state">
          <div className="icon">🎁</div>
          <h3>No exchanges yet</h3>
          <p>Create your first gift exchange and invite your friends & family.</p>
          <button className="btn btn-primary btn-lg" onClick={() => onNavigate("create")}>Create an exchange</button>
        </div>
      ) : (
        <div className="dash-grid">
          {exchanges.map(ex => (
            <div key={ex.id} className="exchange-card glass" onClick={() => onNavigate("detail", { id: ex.id })}>
              <span className="emoji">{ex.emoji || "🎁"}</span>
              <h3>{ex.name}</h3>
              <div className="meta">
                <span>📅 {formatDate(ex.exchange_date)}</span>
                {ex.budget && <span>💰 ${ex.budget}</span>}
                {ex.exchange_date && <span>⏰ {daysUntil(ex.exchange_date)}</span>}
              </div>
            </div>
          ))}
          <div className="create-card glass" onClick={() => onNavigate("create")}>
            <div className="plus">+</div>
            <span>New exchange</span>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// CREATE EXCHANGE
// ============================================================
function CreateScreen({ onNavigate }) {
  const { user } = useAuth();
  const EMOJIS = ["🎄", "🎁", "🎉", "🎃", "💝", "🕎", "🌸", "🎂", "🧧", "❄️"];

  const [name, setName] = useState("");
  const [emoji, setEmoji] = useState("🎁");
  const [date, setDate] = useState("");
  const [budget, setBudget] = useState("");
  const [desc, setDesc] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleCreate = async () => {
    if (!name.trim()) { setError("Give your exchange a name"); return; }
    setError(null); setLoading(true);

    const inviteCode = Math.random().toString(36).substring(2, 8).toUpperCase();

    const { data, error: e } = await supabase.from("exchanges").insert({
      name: name.trim(),
      emoji,
      exchange_date: date || null,
      budget: budget ? parseFloat(budget) : null,
      description: desc.trim() || null,
      organizer_id: user.id,
      invite_code: inviteCode,
      draw_done: false,
    }).select("*").single();

    if (e) { setError(e.message || e.details || "Failed to create exchange"); setLoading(false); return; }

    // Add organizer as first participant
    await supabase.from("participants").insert({
      exchange_id: data.id,
      user_id: user.id,
      role: "organizer",
    });

    setLoading(false);
    onNavigate("detail", { id: data.id });
  };

  return (
    <div className="create-page" style={{ animation: "fadeUp 0.4s ease" }}>
      <div className="detail-header">
        <div className="back" onClick={() => onNavigate("dashboard")}>← Back</div>
      </div>
      <h1>Create an exchange</h1>
      <p className="subtitle">Set up the basics. You can always change these later.</p>
      {error && <div className="auth-error" style={{ marginBottom: 16 }}>{error}</div>}
      <div className="create-form">
        <div className="input-group">
          <label>Exchange name</label>
          <input className="input" placeholder="e.g. Chen Family Christmas" value={name} onChange={e => setName(e.target.value)} />
        </div>
        <div className="input-group">
          <label>Pick an emoji</label>
          <div className="emoji-picker">
            {EMOJIS.map(e => (
              <div key={e} className={"emoji-opt" + (emoji === e ? " active" : "")} onClick={() => setEmoji(e)}>{e}</div>
            ))}
          </div>
        </div>
        <div className="form-row">
          <div className="input-group">
            <label>Exchange date</label>
            <input className="input" type="date" value={date} onChange={e => setDate(e.target.value)} />
          </div>
          <div className="input-group">
            <label>Budget per person ($)</label>
            <input className="input" type="number" placeholder="50" value={budget} onChange={e => setBudget(e.target.value)} />
          </div>
        </div>
        <div className="input-group">
          <label>Description (optional)</label>
          <textarea className="input" placeholder="Any notes for your participants…" value={desc} onChange={e => setDesc(e.target.value)}></textarea>
        </div>
        <div className="form-actions">
          <button className="btn btn-primary btn-lg" onClick={handleCreate} disabled={loading} style={{ flex: 1 }}>
            {loading ? "Creating…" : "Create exchange 🎉"}
          </button>
          <button className="btn btn-secondary btn-lg" onClick={() => onNavigate("dashboard")}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// EXCHANGE DETAIL
// ============================================================
function DetailScreen({ onNavigate, params }) {
  const { user } = useAuth();
  const [exchange, setExchange] = useState(null);
  const [participants, setParticipants] = useState([]);
  const [loading, setLoading] = useState(true);
  const { show: showToast, Toast } = useToast();

  useEffect(() => {
    (async () => {
      const { data: ex } = await supabase.from("exchanges").select("*").eq("id", params.id).single();
      setExchange(ex);
      if (ex) {
        const { data: parts } = await supabase.from("participants").select("*, profiles(display_name, email)").eq("exchange_id", ex.id);
        setParticipants(parts || []);
      }
      setLoading(false);
    })();
  }, [params.id]);

  const inviteUrl = exchange ? (window.location.origin + "?join=" + exchange.invite_code) : "";
  const isOrganizer = exchange?.organizer_id === user?.id;

  const copyInvite = () => {
    if (navigator.clipboard) {
      navigator.clipboard.writeText(inviteUrl);
    } else {
      const ta = document.createElement("textarea");
      ta.value = inviteUrl; document.body.appendChild(ta);
      ta.select(); document.execCommand("copy");
      document.body.removeChild(ta);
    }
    showToast("Invite link copied! 🔗");
  };

  if (loading) return <div className="loading-page"><div className="spinner"></div></div>;
  if (!exchange) return (
    <div className="empty-state" style={{ paddingTop: 120 }}>
      <div className="icon">😕</div>
      <h3>Exchange not found</h3>
      <button className="btn btn-primary" onClick={() => onNavigate("dashboard")}>Back to dashboard</button>
    </div>
  );

  return (
    <div className="detail-page" style={{ animation: "fadeUp 0.4s ease" }}>
      <div className="detail-header">
        <div className="back" onClick={() => onNavigate("dashboard")}>← Back to exchanges</div>
        <h1>{exchange.emoji} {exchange.name}</h1>
        <div className="meta-row">
          <span>📅 {formatDate(exchange.exchange_date)}</span>
          {exchange.budget && <span>💰 ${exchange.budget} budget</span>}
          <span>👥 {participants.length} participant{participants.length !== 1 ? "s" : ""}</span>
          {isOrganizer && <span style={{ color: "var(--accent2)" }}>👑 You're the organizer</span>}
        </div>
      </div>

      {exchange.description && (
        <div className="glass" style={{ padding: 20, marginBottom: 28, fontSize: 14, color: "var(--text2)" }}>
          📝 {exchange.description}
        </div>
      )}

      <div className="stats-grid">
        <div className="stat-card glass">
          <div className="value">{participants.length}</div>
          <div className="label">Participants</div>
        </div>
        <div className="stat-card glass">
          <div className="value">{exchange.budget ? "$" + exchange.budget : "—"}</div>
          <div className="label">Budget</div>
        </div>
        <div className="stat-card glass">
          <div className="value">{exchange.exchange_date ? daysUntil(exchange.exchange_date) : "TBD"}</div>
          <div className="label">Until exchange</div>
        </div>
        <div className="stat-card glass">
          <div className="value">{exchange.draw_done ? "✅" : "⏳"}</div>
          <div className="label">Draw status</div>
        </div>
      </div>

      <div className="invite-box glass">
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>🔗 Invite link</div>
          <div className="invite-url">{inviteUrl}</div>
        </div>
        <button className="btn btn-primary btn-sm" onClick={copyInvite}>Copy</button>
      </div>

      <div className="section-title">👥 Participants</div>
      <div className="participants-list">
        {participants.map(p => (
          <div key={p.id} className="participant-row">
            <div className="avatar">{initials(p.profiles?.display_name)}</div>
            <div className="info">
              <div className="name">
                {p.profiles?.display_name || p.profiles?.email || "Unknown"}
                {p.user_id === user?.id && <span style={{ color: "var(--text3)", fontSize: 12 }}> (You)</span>}
              </div>
              <div className="role">{p.profiles?.email}</div>
            </div>
            <span className={"badge " + (p.role === "organizer" ? "badge-organizer" : "badge-joined")}>
              {p.role === "organizer" ? "👑 Organizer" : "✓ Joined"}
            </span>
          </div>
        ))}
        {participants.length === 1 && (
          <div style={{ textAlign: "center", padding: "24px 0", color: "var(--text3)", fontSize: 14 }}>
            Share the invite link to get people to join!
          </div>
        )}
      </div>
      {Toast}
    </div>
  );
}

// ============================================================
// JOIN EXCHANGE
// ============================================================
function JoinScreen({ onNavigate, inviteCode }) {
  const { user } = useAuth();
  const [exchange, setExchange] = useState(null);
  const [loading, setLoading] = useState(true);
  const [joining, setJoining] = useState(false);
  const [joined, setJoined] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    (async () => {
      const { data } = await supabase.from("exchanges").select("*").eq("invite_code", inviteCode).single();
      setExchange(data);
      if (data && user) {
        const { data: existing } = await supabase.from("participants").select("id").eq("exchange_id", data.id).eq("user_id", user.id);
        if (existing && existing.length > 0) setJoined(true);
      }
      setLoading(false);
    })();
  }, [inviteCode, user]);

  const handleJoin = async () => {
    if (!user) { onNavigate("signup"); return; }
    setJoining(true); setError(null);
    const { error: e } = await supabase.from("participants").insert({
      exchange_id: exchange.id,
      user_id: user.id,
      role: "participant",
    });
    setJoining(false);
    if (e) {
      if (e.message?.includes("duplicate") || e.code === "23505") { setJoined(true); return; }
      setError(e.message || "Failed to join"); return;
    }
    setJoined(true);
  };

  if (loading) return <div className="loading-page"><div className="spinner"></div></div>;
  if (!exchange) return (
    <div className="join-page">
      <div className="join-card glass">
        <div className="emoji">😕</div>
        <h1>Exchange not found</h1>
        <p className="desc">This invite link may be invalid or expired.</p>
        <button className="btn btn-primary btn-lg btn-full" onClick={() => onNavigate("dashboard")}>Go to dashboard</button>
      </div>
    </div>
  );

  return (
    <div className="join-page">
      <div className="join-card glass">
        <div className="emoji">{exchange.emoji || "🎁"}</div>
        <h1>{exchange.name}</h1>
        {exchange.description && <p className="desc">{exchange.description}</p>}
        <p className="host">You've been invited to a gift exchange!</p>
        <div className="join-details">
          {exchange.exchange_date && (
            <div className="join-detail">
              <div className="val">{formatDate(exchange.exchange_date)}</div>
              <div className="lbl">Exchange date</div>
            </div>
          )}
          {exchange.budget && (
            <div className="join-detail">
              <div className="val">${exchange.budget}</div>
              <div className="lbl">Budget</div>
            </div>
          )}
        </div>
        {error && <div className="auth-error" style={{ marginBottom: 16 }}>{error}</div>}
        {joined ? (
          <div>
            <div style={{ fontSize: 18, fontWeight: 600, color: "var(--green)", marginBottom: 16 }}>✅ You're in!</div>
            <button className="btn btn-primary btn-lg btn-full" onClick={() => onNavigate("detail", { id: exchange.id })}>
              View exchange
            </button>
          </div>
        ) : (
          <button className="btn btn-primary btn-lg btn-full" onClick={handleJoin} disabled={joining}>
            {!user ? "Sign up to join 🎉" : joining ? "Joining…" : "Join exchange 🎉"}
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function App() {
  const [screen, setScreen] = useState("loading");
  const [params, setParams] = useState({});

  const navigate = useCallback((s, p) => {
    setScreen(s);
    setParams(p || {});
    window.scrollTo(0, 0);
    if (s !== "join") {
      const url = new URL(window.location);
      url.searchParams.delete("join");
      window.history.replaceState({}, "", url);
    }
  }, []);

  return (
    <AuthProvider>
      <AppRouter screen={screen} setScreen={setScreen} params={params} navigate={navigate} />
    </AuthProvider>
  );
}

function AppRouter({ screen, setScreen, params, navigate }) {
  const { user, loading } = useAuth();

  useEffect(() => {
    if (loading) return;
    const joinCode = new URLSearchParams(window.location.search).get("join");
    if (joinCode) { setScreen("join"); return; }
    if (user) {
      if (["loading", "login", "signup"].includes(screen)) setScreen("dashboard");
    } else {
      if (["loading", "dashboard", "create", "detail"].includes(screen)) setScreen("login");
    }
  }, [loading, user]);

  if (loading || screen === "loading") return <div className="loading-page"><div className="spinner"></div></div>;

  const joinCode = new URLSearchParams(window.location.search).get("join");
  const showNav = !["login", "signup", "join"].includes(screen);

  return (
    <div id="app">
      {showNav && <Nav onNavigate={navigate} />}
      {screen === "login" && <LoginScreen onNavigate={navigate} />}
      {screen === "signup" && <SignupScreen onNavigate={navigate} />}
      {screen === "dashboard" && <DashboardScreen onNavigate={navigate} />}
      {screen === "create" && <CreateScreen onNavigate={navigate} />}
      {screen === "detail" && <DetailScreen onNavigate={navigate} params={params} />}
      {screen === "join" && <JoinScreen onNavigate={navigate} inviteCode={joinCode} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
