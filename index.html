<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Paire — Gift Exchanges, Perfected</title>
<meta name="theme-color" content="#1D1E18">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎁</text></svg>">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root{
--lime:#EE92C2;--blue:#3185FC;--red:#804E49;--white:#FFFCF9;--dark:#1D1E18;
--lime-10:rgba(238,146,194,.10);--lime-20:rgba(238,146,194,.20);--blue-10:rgba(49,133,252,.10);--red-10:rgba(128,78,73,.08);
--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',system-ui,-apple-system,sans-serif;
--r:16px;--r-lg:24px;--r-xl:32px;--ease:cubic-bezier(.25,.46,.45,.94);--ease-out:cubic-bezier(.16,1,.3,1);
--glass:rgba(255,255,255,.55);--glass2:rgba(255,255,255,.65);--glass-border:rgba(29,30,24,.08);--text:var(--dark);--text2:rgba(29,30,24,.55);--text3:rgba(29,30,24,.3)
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--sans);background:var(--white);color:var(--dark);-webkit-font-smoothing:antialiased}
body{overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
#root{min-height:100vh}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;border-radius:100px;font-size:14px;font-weight:600;letter-spacing:.01em;transition:all .32s var(--ease);white-space:nowrap}
.btn-lime{background:var(--lime);color:var(--dark)}
.btn-lime:hover{background:#f2a8d1;transform:translateY(-2px);box-shadow:0 14px 40px rgba(238,146,194,.28)}
.btn-glass{background:rgba(29,30,24,.04);color:var(--dark);border:1px solid rgba(29,30,24,.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.btn-glass:hover{background:rgba(29,30,24,.08);border-color:rgba(29,30,24,.2)}
.btn-red{background:var(--red);color:#fff}
.btn-red:hover{background:#c33e31}
.btn-sm{padding:10px 22px;font-size:13px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn .arrow{transition:transform .28s var(--ease)}
.btn:hover .arrow{transform:translateX(3px)}

/* Inputs */
.input{width:100%;padding:12px 14px;background:rgba(255,255,255,.7);border:1px solid rgba(29,30,24,.1);border-radius:12px;color:var(--dark);font-family:var(--sans);font-size:14px;outline:none;transition:all .25s var(--ease)}
.input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,133,252,.12)}
.input::placeholder{color:var(--text3)}
.input-label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px}
textarea.input{resize:vertical;min-height:60px}
input[type="date"]{color-scheme:light}

/* Mesh background */
#noise-canvas{display:none}
.noise-dim{display:none}
.grain{display:none}
.mesh-bg{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;overflow:hidden}
.mesh-blob{position:absolute;border-radius:50%;filter:blur(120px);animation:mf 20s ease-in-out infinite alternate}
.mesh-blob:nth-child(1){width:60vw;height:60vw;background:var(--lime);top:-15vh;left:-10vw;opacity:.18;animation-duration:22s}
.mesh-blob:nth-child(2){width:50vw;height:50vw;background:var(--blue);top:20vh;right:-15vw;opacity:.12;animation-duration:18s;animation-delay:-6s}
.mesh-blob:nth-child(3){width:45vw;height:45vw;background:var(--red);bottom:-10vh;left:20vw;opacity:.10;animation-duration:25s;animation-delay:-12s}
.mesh-blob:nth-child(4){width:30vw;height:30vw;background:var(--lime);bottom:10vh;right:10vw;opacity:.10;animation-duration:20s;animation-delay:-8s}
@keyframes mf{0%{transform:translate(0,0) scale(1)}33%{transform:translate(5%,-8%) scale(1.05)}66%{transform:translate(-3%,5%) scale(.97)}100%{transform:translate(4%,3%) scale(1.03)}}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:300;display:flex;align-items:center;justify-content:space-between;padding:18px 44px;height:68px;background:rgba(255,252,249,.55);backdrop-filter:blur(28px) saturate(1.4);-webkit-backdrop-filter:blur(28px) saturate(1.4);border-bottom:1px solid rgba(29,30,24,.06)}
.nav-logo{font-family:var(--serif);font-size:28px;letter-spacing:-.02em;cursor:pointer;color:var(--dark)}
.nav-right{display:flex;align-items:center;gap:6px}
.nav-link{padding:8px 18px;font-size:14px;font-weight:500;color:rgba(29,30,24,.45);border-radius:100px;transition:all .25s}
.nav-link:hover{color:var(--dark);background:rgba(29,30,24,.02)}
.nav-avatar{width:32px;height:32px;border-radius:50%;background:var(--dark);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:12px;font-weight:700;cursor:pointer;transition:all .25s}
.nav-avatar:hover{box-shadow:0 0 0 2px var(--dark)}
.dropdown-menu{position:absolute;top:100%;right:0;margin-top:8px;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(29,30,24,.08);border-radius:var(--r);padding:6px;min-width:180px;z-index:400;box-shadow:0 16px 48px rgba(29,30,24,.06)}
.dropdown-menu button,.dropdown-menu div{width:100%;text-align:left;padding:8px 12px;border-radius:10px;font-size:13px;color:var(--dark)}
.dropdown-menu button:hover{background:rgba(29,30,24,.04)}

/* Views */
.view{display:none;min-height:100vh;padding-top:68px;position:relative;z-index:10}
.view.active{display:block}

/* Hero */
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 68px);padding:48px;text-align:center;position:relative}
.hero-badge{display:inline-flex;align-items:center;gap:9px;padding:8px 22px;margin-bottom:36px;background:rgba(238,146,194,.1);border:1px solid rgba(238,146,194,.2);border-radius:100px;font-size:13px;font-weight:600;color:var(--dark);animation:fadeUp .65s var(--ease) both}
.hero-badge .pulse{width:7px;height:7px;background:var(--lime);border-radius:50%;animation:blink 2.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(1.6)}}
.hero h1{font-family:var(--serif);font-size:clamp(50px,8vw,110px);line-height:.96;letter-spacing:-.045em;margin-bottom:24px;animation:fadeUp .65s var(--ease) .07s both}
.hero h1 .accent{color:#d06898;position:relative;display:inline-block}
.hero h1 .accent::after{content:'';position:absolute;bottom:4px;left:-6px;right:-6px;height:8px;background:var(--lime);opacity:.25;border-radius:4px;z-index:-1}
.hero-sub{font-size:18px;line-height:1.6;color:rgba(29,30,24,.5);max-width:420px;margin:0 auto 44px;animation:fadeUp .65s var(--ease) .14s both}
.hero-btns{display:flex;gap:14px;justify-content:center;animation:fadeUp .65s var(--ease) .21s both}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* Decorative vectors — fixed position, visible across all screens */
.deco-layer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;pointer-events:none}
.deco{position:absolute;pointer-events:none}
.deco svg{width:100%;height:100%}
.deco-f1{width:340px;height:340px;top:-4%;left:-4%;opacity:.18;animation:drift 32s ease-in-out infinite}
.deco-f2{width:260px;height:260px;bottom:2%;right:-2%;opacity:.15;animation:drift 26s ease-in-out infinite reverse}
.deco-f3{width:300px;height:300px;top:35%;right:-6%;opacity:.12;animation:drift 28s ease-in-out infinite 6s}
.deco-f4{width:220px;height:220px;bottom:30%;left:-3%;opacity:.10;animation:drift 24s ease-in-out infinite 10s}
.deco-s1{width:64px;height:64px;top:16%;right:12%;opacity:.25;animation:drift 20s ease-in-out infinite 4s}
.deco-s2{width:48px;height:48px;bottom:18%;left:8%;opacity:.20;animation:drift 18s ease-in-out infinite 8s}
.deco-s3{width:40px;height:40px;top:55%;left:15%;opacity:.16;animation:drift 22s ease-in-out infinite 2s}
.deco-s4{width:52px;height:52px;top:10%;left:40%;opacity:.14;animation:drift 25s ease-in-out infinite 12s}
@keyframes drift{0%,100%{transform:translate(0,0) rotate(0)}33%{transform:translate(18px,-22px) rotate(6deg)}66%{transform:translate(-14px,16px) rotate(-4deg)}}

/* Auth */
.auth-page{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 68px);padding:24px}
.auth-card{width:100%;max-width:360px;background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.08);border-radius:var(--r-lg);padding:36px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.auth-card h1{font-family:var(--serif);font-size:28px;letter-spacing:-.02em;margin-bottom:4px}
.auth-card .subtitle{font-size:14px;color:var(--text2);margin-bottom:24px}
.auth-form{display:flex;flex-direction:column;gap:12px}
.auth-footer{text-align:center;margin-top:18px;font-size:13px;color:var(--text2)}
.auth-footer a{color:var(--lime);cursor:pointer}
.auth-error{background:rgba(128,78,73,.12);border:1px solid rgba(128,78,73,.25);border-radius:12px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:8px}

/* Dashboard */
.dash-page{padding:28px 44px;max-width:1140px;margin:0 auto}
.dash-header{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.dash-header h2{font-family:var(--serif);font-size:30px;letter-spacing:-.02em}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* Exchange Card */
.ex-card{border-radius:var(--r-lg);overflow:hidden;position:relative;cursor:pointer;height:240px;transition:all .35s var(--ease);border:1px solid rgba(29,30,24,.07);background:rgba(255,255,255,.6)}
.ex-card:hover{transform:translateY(-4px);box-shadow:0 24px 56px rgba(29,30,24,.08),0 0 0 1px rgba(238,146,194,.15)}
.ex-card-bg{position:absolute;inset:0;transition:transform .6s var(--ease)}
.ex-card:hover .ex-card-bg{transform:scale(1.05)}
.ex-card-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(29,30,24,.75) 0%,rgba(29,30,24,.2) 45%,rgba(29,30,24,.02) 100%)}
.ex-card-top{position:absolute;top:0;left:0;right:0;padding:14px 18px;z-index:3;display:flex;justify-content:space-between;align-items:center}
.ex-card-budget{padding:4px 10px;border-radius:8px;background:rgba(0,0,0,.3);backdrop-filter:blur(8px);font-size:12px;font-weight:700;color:var(--lime)}
.ex-card-body{position:absolute;bottom:0;left:0;right:0;padding:22px;z-index:3}
.ex-card-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}
.ex-card-tag.live{background:rgba(238,146,194,.15);color:var(--lime);border:1px solid rgba(238,146,194,.2)}
.ex-card-tag.upcoming{background:rgba(49,133,252,.12);color:var(--blue);border:1px solid rgba(49,133,252,.18)}
.tag-dot{width:5px;height:5px;border-radius:50%}
.ex-card-tag.live .tag-dot{background:var(--lime);animation:blink 2s ease-in-out infinite}
.ex-card-tag.upcoming .tag-dot{background:var(--blue)}
.ex-card-title{font-family:var(--serif);font-size:20px;letter-spacing:-.02em;margin-bottom:6px}
.ex-card-meta{font-size:12px;color:var(--text3);display:flex;gap:12px}
.create-card{border:1px dashed rgba(29,30,24,.12);border-radius:var(--r-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:240px;cursor:pointer;color:var(--text3);font-size:13px;transition:all .28s var(--ease)}
.create-card:hover{border-color:var(--lime);color:var(--lime);background:rgba(238,146,194,.03)}
.empty-state{text-align:center;padding:60px 20px}
.empty-state h3{font-family:var(--serif);font-size:24px;margin-bottom:8px}
.empty-state p{color:var(--text2);font-size:14px;margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto}

/* Detail */
.detail-page{padding:28px 44px;max-width:720px;margin:0 auto}
.detail-back{font-size:13px;color:var(--text2);cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:18px;font-weight:500;transition:color .2s}
.detail-back:hover{color:var(--dark)}
.detail-title{font-family:var(--serif);font-size:28px;letter-spacing:-.02em;margin-bottom:6px}
.detail-meta-row{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 20px;color:var(--text2);font-size:13px}
.detail-meta-pill{padding:6px 12px;background:rgba(255,255,255,.5);border:1px solid rgba(29,30,24,.08);border-radius:10px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:22px}
.stat-card{background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.07);border-radius:var(--r);padding:16px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.stat-card .val{font-size:22px;font-weight:700;font-family:var(--serif)}
.stat-card .lbl{font-size:11px;color:var(--text3);margin-top:2px}
.invite-box{background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.08);border-radius:var(--r);padding:14px;margin-bottom:22px;display:flex;align-items:center;gap:12px}
.invite-url{flex:1;padding:8px 10px;background:rgba(255,255,255,.5);border-radius:8px;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.section-title{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text2)}
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.5);border:1px solid rgba(29,30,24,.08);border-radius:100px;padding:4px;margin-bottom:22px}
.tab{flex:1;padding:8px 16px;border-radius:100px;font-size:13px;font-weight:500;color:var(--text3);text-align:center;transition:all .28s var(--ease)}
.tab:hover{color:var(--text2)}
.tab.active{background:rgba(29,30,24,.06);color:var(--dark)}
.participants-list{display:flex;flex-direction:column;gap:8px}
.participant-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--r);background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.06)}
.participant-row .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.participant-row .info{flex:1;min-width:0}
.participant-row .name{font-size:13px;font-weight:500}
.participant-row .role{font-size:11px;color:var(--text3)}
.badge{font-size:10px;padding:3px 10px;border-radius:100px;font-weight:600}
.badge-org{background:rgba(128,78,73,.12);color:var(--red)}
.badge-joined{background:rgba(49,133,252,.1);color:var(--blue)}

/* Join */
.join-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 68px);padding:24px}
.join-card{width:100%;max-width:400px;background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.08);border-radius:var(--r-lg);padding:36px;text-align:center;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.join-card h1{font-family:var(--serif);font-size:24px;margin-bottom:4px}
.join-details{display:flex;justify-content:center;gap:24px;margin:20px 0}
.join-detail{text-align:center}
.join-detail .val{font-size:18px;font-weight:700}
.join-detail .lbl{font-size:11px;color:var(--text3);margin-top:2px}

/* Create */
.create-page{max-width:500px;margin:0 auto;padding:28px 44px}
.create-page h2{font-family:var(--serif);font-size:28px;margin-bottom:4px}
.create-sub{font-size:14px;color:var(--text2);margin-bottom:24px}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap}
.emoji-opt{width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,.5);border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s}
.emoji-opt:hover{background:rgba(255,255,255,.8)}
.emoji-opt.active{border-color:var(--lime);background:rgba(238,146,194,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:10px;margin-top:8px}

/* Wishlist */
.wish-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.06);border-radius:var(--r);margin-bottom:8px}
.wish-info{flex:1;min-width:0}
.wish-name{font-size:13px;font-weight:500;margin-bottom:1px}
.wish-sub{font-size:11px;color:var(--text3)}
.wish-price{font-size:14px;font-weight:700;color:var(--lime);white-space:nowrap}
.wish-purchased{opacity:.45}
.wish-purchased .wish-name{text-decoration:line-through}
.wish-meta{font-size:11px;color:var(--text3)}
.wish-meta a{color:var(--blue)}
.add-form{background:rgba(255,255,255,.6);border:1px solid rgba(29,30,24,.08);border-radius:var(--r);padding:16px;margin-bottom:14px}
.add-row{display:grid;grid-template-columns:1fr 100px;gap:8px}
.envelope-body{font-size:28px}

/* Envelope */
.envelope{width:80px;height:64px;margin:0 auto 18px;cursor:pointer;background:var(--dark);border-radius:16px;display:flex;align-items:center;justify-content:center;color:var(--white);box-shadow:0 8px 28px rgba(29,30,24,.15);transition:transform .25s var(--ease)}
.envelope:hover{transform:scale(1.08)}
.envelope svg{width:28px;height:28px}

/* Confetti */
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:600;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:cf 3s ease-in forwards}
@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Utils */
.loading-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:10}
.spinner{width:28px;height:28px;border:3px solid rgba(29,30,24,.08);border-top-color:var(--lime);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:100px;background:rgba(29,30,24,.88);border:1px solid rgba(29,30,24,.1);backdrop-filter:blur(20px);color:var(--white);font-size:13px;z-index:500}

@media(max-width:768px){
nav{padding:14px 16px;height:60px}.nav-logo{font-size:22px}.nav-link{display:none}
.hero{padding:20px}.hero h1{font-size:clamp(38px,12vw,60px)}.hero-btns{flex-direction:column;gap:10px}
.hero-btns .btn{justify-content:center}.deco{display:none}
.dash-page,.detail-page,.create-page{padding:20px 16px}
.dash-grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:1fr 1fr}
.invite-box{flex-direction:column;align-items:stretch}
.form-row{grid-template-columns:1fr}
.form-actions{flex-direction:column}
.toast{left:16px;right:16px;transform:none;text-align:center}
}
</style>
</head>
<body>
<div class="mesh-bg"><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div><div class="mesh-blob"></div></div>
