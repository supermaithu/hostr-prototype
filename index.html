<style>
:root{--bg:#0a0b14;--bg2:#12131f;--bg3:#1a1b2e;--glass:rgba(255,255,255,0.04);--glass2:rgba(255,255,255,0.07);--glass3:rgba(255,255,255,0.1);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.12);--text:#fff;--text2:rgba(255,255,255,0.7);--text3:rgba(255,255,255,0.4);--accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,0.3);--green:#00b894;--red:#e17055;--orange:#fdcb6e;--radius:16px;--radius-sm:10px;--radius-xs:6px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
#root{min-height:100vh;display:flex;flex-direction:column}
.glass{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.glass:hover{border-color:var(--border2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:var(--radius-sm);font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 20px var(--accent-glow)}
.btn-primary:hover:not(:disabled){background:#7c6ef7;transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
.btn-secondary{background:var(--glass2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--glass3);border-color:var(--border2)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-ghost:hover{color:var(--text);background:var(--glass)}
.btn-full{width:100%}.btn-sm{padding:8px 16px;font-size:13px}.btn-lg{padding:16px 32px;font-size:17px}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-group label{font-size:13px;font-weight:500;color:var(--text2)}
.input{width:100%;padding:14px 16px;background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;transition:all .2s;outline:none}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input::placeholder{color:var(--text3)}
textarea.input{resize:vertical;min-height:80px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(10,11,20,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--text);cursor:pointer}
.nav-logo span{font-size:20px}
.nav-actions{display:flex;gap:8px;align-items:center}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.nav-avatar:hover{background:#7c6ef7}
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.auth-page::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);top:-200px;right:-100px;opacity:.5;pointer-events:none}
.auth-page::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(162,155,254,0.15) 0%,transparent 70%);bottom:-150px;left:-100px;opacity:.5;pointer-events:none}
.auth-card{width:100%;max-width:420px;padding:40px;position:relative;z-index:1;animation:fadeUp .5s ease}
.auth-card h1{font-family:'Instrument Serif',serif;font-size:32px;margin-bottom:8px}
.auth-card .subtitle{color:var(--text2);margin-bottom:32px;font-size:15px}
.auth-form{display:flex;flex-direction:column;gap:20px}
.auth-footer{text-align:center;margin-top:24px;font-size:14px;color:var(--text2)}
.auth-footer a{color:var(--accent2);cursor:pointer;text-decoration:none}
.auth-footer a:hover{text-decoration:underline}
.auth-error{background:rgba(225,112,85,0.1);border:1px solid rgba(225,112,85,0.3);border-radius:var(--radius-sm);padding:12px 16px;color:var(--red);font-size:14px}
.dashboard{padding:32px 24px;max-width:900px;margin:0 auto;width:100%}
.dash-header{margin-bottom:32px}
.dash-header h1{font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:4px}
.dash-header p{color:var(--text2);font-size:15px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.exchange-card{padding:24px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.exchange-card:hover{transform:translateY(-2px);border-color:var(--accent)}
.exchange-card .emoji{font-size:32px;margin-bottom:12px;display:block}
.exchange-card h3{font-size:17px;font-weight:600;margin-bottom:8px}
.exchange-card .meta{display:flex;flex-wrap:wrap;gap:12px;color:var(--text2);font-size:13px}
.exchange-card .meta span{display:flex;align-items:center;gap:4px}
.create-card{padding:24px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:180px;border-style:dashed}
.create-card:hover{border-color:var(--accent);background:var(--glass2)}
.create-card .plus{font-size:32px;color:var(--accent2);margin-bottom:8px}
.create-card span{color:var(--text2);font-size:14px}
.empty-state{text-align:center;padding:60px 24px}
.empty-state .icon{font-size:48px;margin-bottom:16px}
.empty-state h3{font-size:20px;margin-bottom:8px}
.empty-state p{color:var(--text2);font-size:15px;margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto}
.create-page{padding:32px 24px;max-width:600px;margin:0 auto;width:100%}
.create-page h1{font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:8px}
.create-page .subtitle{color:var(--text2);margin-bottom:32px}
.create-form{display:flex;flex-direction:column;gap:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap}
.emoji-opt{width:44px;height:44px;border-radius:var(--radius-xs);background:var(--glass);border:2px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s}
.emoji-opt:hover{background:var(--glass2)}
.emoji-opt.active{border-color:var(--accent);background:var(--glass3)}
.form-actions{display:flex;gap:12px;margin-top:8px}
.detail-page{padding:32px 24px;max-width:800px;margin:0 auto;width:100%}
.detail-header{margin-bottom:32px}
.detail-header .back{color:var(--text2);font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;margin-bottom:16px}
.detail-header .back:hover{color:var(--text)}
.detail-header h1{font-family:'Instrument Serif',serif;font-size:28px;display:flex;align-items:center;gap:12px}
.detail-header .meta-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:12px;color:var(--text2);font-size:14px}
.detail-header .meta-row span{display:flex;align-items:center;gap:6px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px}
.stat-card{padding:20px;text-align:center}
.stat-card .value{font-size:24px;font-weight:700;color:var(--text)}
.stat-card .label{font-size:12px;color:var(--text2);margin-top:4px}
.invite-box{padding:20px;margin-bottom:28px;display:flex;align-items:center;gap:16px}
.invite-url{flex:1;padding:10px 14px;background:var(--bg);border-radius:var(--radius-xs);font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'DM Sans',monospace}
.section-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.participants-list{display:flex;flex-direction:column;gap:8px}
.participant-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--border)}
.participant-row .avatar{width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.participant-row .info{flex:1;min-width:0}
.participant-row .name{font-size:14px;font-weight:500}
.participant-row .role{font-size:12px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-organizer{background:rgba(108,92,231,0.2);color:var(--accent2)}
.badge-joined{background:rgba(0,184,148,0.15);color:var(--green)}
.join-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
.join-page::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow) 0%,transparent 70%);top:-200px;left:50%;transform:translateX(-50%);opacity:.4;pointer-events:none}
.join-card{width:100%;max-width:440px;padding:40px;text-align:center;position:relative;z-index:1}
.join-card .emoji{font-size:48px;margin-bottom:16px}
.join-card h1{font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:8px}
.join-card .desc{color:var(--text2);font-size:15px;margin-bottom:8px}
.join-card .host{color:var(--text3);font-size:13px;margin-bottom:28px}
.join-details{display:flex;justify-content:center;gap:24px;margin-bottom:28px}
.join-detail{text-align:center}
.join-detail .val{font-size:18px;font-weight:600}
.join-detail .lbl{font-size:12px;color:var(--text3);margin-top:2px}
.loading-page{min-height:100vh;display:flex;align-items:center;justify-content:center}
.spinner{width:32px;height:32px;border:3px solid var(--glass3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:var(--radius-sm);background:var(--bg3);border:1px solid var(--border2);color:var(--text);font-size:14px;z-index:1000;animation:fadeUp .3s ease;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.dropdown-menu{position:absolute;top:100%;right:0;margin-top:8px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px;min-width:180px;z-index:200;animation:fadeUp .2s ease;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tabs{display:flex;gap:4px;margin-bottom:24px;border-bottom:1px solid var(--border);padding-bottom:0}
.tab{padding:10px 20px;font-size:14px;font-weight:500;color:var(--text3);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab:hover{color:var(--text2)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.wishlist-grid{display:flex;flex-direction:column;gap:10px}
.wish-item{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--border);transition:all .2s}
.wish-item:hover{border-color:var(--border2)}
.wish-item .wish-info{flex:1;min-width:0}
.wish-item .wish-name{font-size:15px;font-weight:500;margin-bottom:2px}
.wish-item .wish-meta{font-size:12px;color:var(--text3);display:flex;gap:12px;flex-wrap:wrap}
.wish-item .wish-price{font-size:15px;font-weight:600;color:var(--green);white-space:nowrap}
.wish-item .wish-link{color:var(--accent2);font-size:12px;text-decoration:none}
.wish-item .wish-link:hover{text-decoration:underline}
.wish-purchased{opacity:.5}
.wish-purchased .wish-name{text-decoration:line-through}
.add-wish-form{display:flex;flex-direction:column;gap:12px;padding:20px;margin-bottom:20px}
.add-wish-row{display:grid;grid-template-columns:1fr 120px;gap:12px}
.envelope{width:120px;height:90px;margin:0 auto 24px;cursor:pointer;position:relative;transition:all .3s}
.envelope:hover{transform:scale(1.05)}
.envelope-body{width:100%;height:100%;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 8px 32px var(--accent-glow)}
.confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:600;overflow:hidden}
.confetti-piece{position:absolute;width:10px;height:10px;top:-20px;animation:confettiFall 3s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:640px){
.nav{padding:12px 16px}
.nav-logo{font-size:16px}
.dashboard,.create-page,.detail-page{padding:20px 16px}
.auth-card{padding:28px 20px}
.auth-card h1{font-size:26px}
.auth-card .subtitle{font-size:14px;margin-bottom:24px}
.auth-form{gap:16px}
.form-row,.add-wish-row{grid-template-columns:1fr}
.stats-grid{grid-template-columns:1fr 1fr;gap:8px}
.stat-card{padding:14px}
.stat-card .value{font-size:20px}
.stat-card .label{font-size:11px}
.invite-box{flex-direction:column;align-items:stretch;padding:16px}
.invite-url{font-size:12px;padding:8px 12px;word-break:break-all;white-space:normal}
.join-card{padding:28px 20px}
.join-card h1{font-size:24px}
.join-card .emoji{font-size:40px}
.join-details{gap:16px}
.form-actions{flex-direction:column}
.dash-grid{grid-template-columns:1fr}
.dash-header h1{font-size:24px}
.tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;font-size:13px;white-space:nowrap;flex-shrink:0}
.detail-header h1{font-size:22px;flex-wrap:wrap}
.detail-header .meta-row{gap:10px;font-size:13px}
.section-title{font-size:15px}
.participant-row{padding:12px 14px;gap:10px}
.participant-row .avatar{width:32px;height:32px;font-size:12px}
.participant-row .name{font-size:13px}
.participant-row .role{font-size:11px}
.badge{font-size:10px;padding:2px 6px}
.wish-item{flex-wrap:wrap;gap:10px;padding:14px}
.wish-item .wish-name{font-size:14px}
.wish-item .wish-price{font-size:14px}
.wish-item .wish-meta{font-size:11px}
.add-wish-form{padding:16px}
.emoji-picker{gap:6px}
.emoji-opt{width:40px;height:40px;font-size:18px}
.create-card{min-height:120px}
.exchange-card{padding:20px}
.exchange-card .emoji{font-size:28px;margin-bottom:8px}
.exchange-card h3{font-size:16px}
.btn-lg{padding:14px 24px;font-size:16px}
.input{padding:12px 14px;font-size:14px}
.dropdown-menu{min-width:160px;right:-8px}
.empty-state{padding:40px 16px}
.empty-state .icon{font-size:40px}
.empty-state h3{font-size:18px}
.empty-state p{font-size:14px}
.envelope{width:100px;height:75px}
.envelope-body{font-size:28px}
.toast{left:16px;right:16px;transform:none;text-align:center;font-size:13px;padding:10px 16px;bottom:16px}
}

/* Touch optimization */
@media(hover:none){
.btn:active{transform:scale(0.97)}
.btn-primary:active{transform:scale(0.97)}
.exchange-card:active{transform:scale(0.98)}
.glass:hover{border-color:var(--border)}
.emoji-opt:active{background:var(--glass3)}
}

/* Safe area for notched phones */
@supports(padding:max(0px)){
.nav{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
.dashboard,.create-page,.detail-page,.auth-page{padding-left:max(16px,env(safe-area-inset-left));padding-right:max(16px,env(safe-area-inset-right))}
.toast{bottom:max(16px,env(safe-area-inset-bottom))}
}

/* Dark theme input fixes */
input[type="date"]{color-scheme:dark}
input[type="number"]{-moz-appearance:textfield}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}

/* Remove tap highlights */
*{-webkit-tap-highlight-color:transparent}

/* Prevent text size adjust on rotation */
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}

/* Small phones (iPhone SE, etc) */
@media(max-width:375px){
.auth-card{padding:24px 16px}
.auth-card h1{font-size:24px}
.join-card{padding:24px 16px}
.stats-grid{gap:6px}
.stat-card{padding:12px}
.stat-card .value{font-size:18px}
.emoji-opt{width:36px;height:36px;font-size:16px}
.detail-header h1{font-size:20px}
}
</style>

async then(resolve){const hh={...h};if(chain._si)hh.Accept="application/vnd.pgrst.object+json";let u=url+"?select="+encodeURIComponent(chain._s);chain._f.forEach(f=>{u+="&"+f;});if(chain._o)u+="&order="+chain._o;if(chain._l)u+="&limit="+chain._l;try{const r=await fetch(u,{headers:hh});if(!r.ok){resolve({data:null,error:await r.json()});return;}resolve({data:await r.json(),error:null});}catch(err){resolve({data:null,error:err});}},
insert(rows){return{select(cols){return{single(){return{async then(resolve){try{const r=await fetch(url+"?select="+encodeURIComponent(cols||"*"),{method:"POST",headers:{...h,Accept:"application/vnd.pgrst.object+json"},body:JSON.stringify(Array.isArray(rows)?rows:[rows])});if(!r.ok){resolve({data:null,error:await r.json()});return;}resolve({data:await r.json(),error:null});}catch(err){resolve({data:null,error:err});}}};},async then(resolve){try{const r=await fetch(url+"?select="+encodeURIComponent(cols||"*"),{method:"POST",headers:h,body:JSON.stringify(Array.isArray(rows)?rows:[rows])});if(!r.ok){resolve({data:null,error:await r.json()});return;}resolve({data:await r.json(),error:null});}catch(err){resolve({data:null,error:err});}}};},async then(resolve){try{const r=await fetch(url,{method:"POST",headers:h,body:JSON.stringify(Array.isArray(rows)?rows:[rows])});if(!r.ok){resolve({data:null,error:await r.json()});return;}resolve({data:await r.json(),error:null});}catch(err){resolve({data:null,error:err});}}};},
update(vals){return{eq(col,val){return{select(cols){return{single(){return{async then(resolve){try{const r=await fetch(url+"?"+col+"=eq."+val+"&select="+encodeURIComponent(cols||"*"),{method:"PATCH",headers:{...h,Accept:"application/vnd.pgrst.object+json"},body:JSON.stringify(vals)});if(!r.ok){resolve({data:null,error:await r.json()});return;}resolve({data:await r.json(),error:null});}catch(err){resolve({data:null,error:err});}}};},async then(resolve){try{const r=await fetch(url+"?"+col+"=eq."+val+"&select="+encodeURIComponent(cols||"*"),{method:"PATCH",headers:h,body:JSON.stringify(vals)});if(!r.ok){resolve({data:null,error:await r.json()});return;}resolve({data:await r.json(),error:null});}catch(err){resolve({data:null,error:err});}}};},async then(resolve){try{const r=await fetch(url+"?"+col+"=eq."+val,{method:"PATCH",headers:h,body:JSON.stringify(vals)});if(!r.ok){resolve({error:await r.json()});return;}resolve({error:null});}catch(err){resolve({error:err});}}};};},
delete(){return{eq(col,val){return{async then(resolve){try{const r=await fetch(url+"?"+col+"=eq."+val,{method:"DELETE",headers:h});if(!r.ok){resolve({error:await r.json()});return;}resolve({error:null});}catch(err){resolve({error:err});}}};};},
};return chain;}
};

const AuthCtx=createContext();
function AuthProvider({children}){
const[user,setUser]=useState(null);const[profile,setProfile]=useState(null);const[loading,setLoading]=useState(true);
const loadProfile=useCallback(async(u)=>{if(!u){setProfile(null);return;}const{data}=await supabase.from("profiles").select("*").eq("id",u.id).single();setProfile(data);},[]);
useEffect(()=>{(async()=>{const{data:{user:u}}=await supabase.auth.getUser();setUser(u);if(u)await loadProfile(u);setLoading(false);})();},[]);
const signUp=async(email,password,name)=>{const{data,error}=await supabase.auth.signUp({email,password,options:{data:{display_name:name}}});if(error)return{error};const u=data.user||data;if(u?.id){await supabase.from("profiles").insert({id:u.id,display_name:name,email}).select("*").single();setUser(u);await loadProfile(u);}return{data,error:null};};
const signIn=async(email,password)=>{const{data,error}=await supabase.auth.signInWithPassword({email,password});if(error)return{error};const u=data.user||data;setUser(u);await loadProfile(u);return{data,error:null};};
const signOut=async()=>{await supabase.auth.signOut();setUser(null);setProfile(null);};
return <AuthCtx.Provider value={{user,profile,loading,signUp,signIn,signOut}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);
function initials(n){if(!n)return"?";return n.split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);}
function formatDate(d){if(!d)return"TBD";return new Date(d+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function daysUntil(d){if(!d)return null;const diff=Math.ceil((new Date(d+"T00:00:00")-new Date())/(864e5));if(diff<0)return"Past";if(diff===0)return"Today!";if(diff===1)return"Tomorrow";return diff+" days";}
function useToast(){const[msg,setMsg]=useState(null);const show=(m)=>{setMsg(m);setTimeout(()=>setMsg(null),2800);};const Toast=msg?<div className="toast">{msg}</div>:null;return{show,Toast};}

<div style={{marginBottom:20}}><div className="section-title">📋 My Wishlist</div><WishlistPanel exchangeId={exchange.id} userId={user.id} isOwn={true}/></div>
{participants.filter(p=>p.user_id!==user.id).length>0&&<div><div className="section-title" style={{marginTop:32}}>👥 Other Wishlists</div>
<div className="participants-list" style={{marginBottom:16}}>{participants.filter(p=>p.user_id!==user.id).map(p=><div key={p.id} className="participant-row" style={{cursor:"pointer"}} onClick={()=>setSelWish(selWish===p.user_id?null:p.user_id)}><div className="avatar">{initials(p.profiles?.display_name)}</div><div className="info"><div className="name">{p.profiles?.display_name||"Unknown"}</div></div><span style={{color:"var(--text3)",fontSize:13}}>{selWish===p.user_id?"▾ Hide":"▸ View"}</span></div>)}</div>
{selWish&&<div style={{animation:"fadeUp .3s ease"}}><WishlistPanel exchangeId={exchange.id} userId={selWish} isOwn={false}/></div>}
</div>}
</div>}

{tab==="draw"&&<div>
{!exchange.draw_done?<div style={{textAlign:"center",padding:"40px 24px",maxWidth:500,margin:"0 auto"}}><div className="glass" style={{padding:40}}><div style={{fontSize:48,marginBottom:16}}>🎅</div><h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:24,marginBottom:8}}>Secret Santa Draw</h2><p style={{color:"var(--text2)",fontSize:14,marginBottom:24}}>{participants.length<3?"You need at least 3 participants.":"Ready! Each person will be randomly matched."}</p><p style={{color:"var(--text3)",fontSize:13,marginBottom:24}}>👥 {participants.length} participant{participants.length!==1?"s":""}</p>{isOrg?<button className="btn btn-primary btn-lg" onClick={runDraw} disabled={drawLd||participants.length<3}>{drawLd?"Running…":"🎅 Run the Draw"}</button>:<p style={{color:"var(--text3)",fontSize:14}}>Waiting for the organizer to run the draw…</p>}</div></div>
:<div style={{textAlign:"center",padding:"40px 24px",maxWidth:500,margin:"0 auto"}}>
{!revealed?<div className="glass" style={{padding:40}}><div style={{fontSize:48,marginBottom:16}}>📩</div><h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:24,marginBottom:8}}>The draw is done!</h2><p style={{color:"var(--text2)",fontSize:14,marginBottom:28}}>Tap below to reveal who you're buying for.</p><div className="envelope" onClick={revealMatch}><div className="envelope-body">🎁</div></div><p style={{color:"var(--text3)",fontSize:12}}>Tap the envelope</p></div>
:<div className="glass" style={{padding:40,animation:"fadeUp .5s ease"}}><span style={{fontSize:64,display:"block",marginBottom:20}}>🎉</span><h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:28,marginBottom:8}}>You're the Secret Santa for…</h2><div style={{fontSize:24,fontWeight:700,color:"var(--accent2)",margin:"16px 0"}}>{myMatch?.display_name||"Someone special!"}</div><p style={{color:"var(--text2)",fontSize:14}}>Check their wishlist for gift ideas!</p><button className="btn btn-primary" style={{marginTop:20}} onClick={()=>{setTab("wishlists");const mp=participants.find(p=>p.profiles?.display_name===myMatch?.display_name);if(mp)setSelWish(mp.user_id);}}>View their wishlist →</button></div>}
{showConfetti&&<Confetti/>}
</div>}
</div>}
{Toast}</div>;}

function JoinScreen({onNavigate,inviteCode}){const{user}=useAuth();const[exchange,setExchange]=useState(null);const[ld,setLd]=useState(true);const[joining,setJoining]=useState(false);const[joined,setJoined]=useState(false);const[error,setError]=useState(null);
useEffect(()=>{(async()=>{const{data}=await supabase.from("exchanges").select("*").eq("invite_code",inviteCode).single();setExchange(data);if(data&&user){const{data:existing}=await supabase.from("participants").select("id").eq("exchange_id",data.id).eq("user_id",user.id);if(existing&&existing.length>0)setJoined(true);}setLd(false);})();},[inviteCode,user]);
const go=async()=>{if(!user){sessionStorage.setItem("hostr_join",inviteCode);onNavigate("signup");return;}setJoining(true);setError(null);const{error:e}=await supabase.from("participants").insert({exchange_id:exchange.id,user_id:user.id,role:"participant"});setJoining(false);if(e){if(e.message?.includes("duplicate")||e.code==="23505"){setJoined(true);return;}setError(e.message||"Failed to join");return;}setJoined(true);};
if(ld)return<div className="loading-page"><div className="spinner"></div></div>;
if(!exchange)return<div className="join-page"><div className="join-card glass"><div className="emoji">😕</div><h1>Exchange not found</h1><p className="desc">This invite link may be invalid or expired.</p><button className="btn btn-primary btn-lg btn-full" onClick={()=>onNavigate("dashboard")}>Go to dashboard</button></div></div>;
return<div className="join-page"><div className="join-card glass"><div className="emoji">{exchange.emoji||"🎁"}</div><h1>{exchange.name}</h1>{exchange.description&&<p className="desc">{exchange.description}</p>}<p className="host">You've been invited to a gift exchange!</p><div className="join-details">{exchange.exchange_date&&<div className="join-detail"><div className="val">{formatDate(exchange.exchange_date)}</div><div className="lbl">Exchange date</div></div>}{exchange.budget&&<div className="join-detail"><div className="val">${exchange.budget}</div><div className="lbl">Budget</div></div>}</div>{error&&<div className="auth-error" style={{marginBottom:16}}>{error}</div>}{joined?<div><div style={{fontSize:18,fontWeight:600,color:"var(--green)",marginBottom:16}}>✅ You're in!</div><button className="btn btn-primary btn-lg btn-full" onClick={()=>onNavigate("detail",{id:exchange.id})}>View exchange</button></div>:<button className="btn btn-primary btn-lg btn-full" onClick={go} disabled={joining}>{!user?"Sign up to join 🎉":joining?"Joining…":"Join exchange 🎉"}</button>}</div></div>;}

function App(){const[screen,setScreen]=useState("loading");const[params,setParams]=useState({});
const navigate=useCallback((s,p)=>{setScreen(s);setParams(p||{});window.scrollTo(0,0);if(s!=="join"){const u=new URL(window.location);u.searchParams.delete("join");window.history.replaceState({},"",u);}},[]);
return<AuthProvider><AppRouter screen={screen} setScreen={setScreen} params={params} navigate={navigate}/></AuthProvider>;}

function AppRouter({screen,setScreen,params,navigate}){const{user,loading}=useAuth();
useEffect(()=>{if(loading)return;const jc=new URLSearchParams(window.location.search).get("join");if(jc){setScreen("join");return;}
if(user){const pj=sessionStorage.getItem("hostr_join");if(pj){sessionStorage.removeItem("hostr_join");window.location.search="?join="+pj;return;}if(["loading","login","signup"].includes(screen))setScreen("dashboard");}
else{if(["loading","dashboard","create","detail"].includes(screen))setScreen("login");}
},[loading,user]);
if(loading||screen==="loading")return<div className="loading-page"><div className="spinner"></div></div>;
const jc=new URLSearchParams(window.location.search).get("join");const showNav=!["login","signup","join"].includes(screen);
return<div id="app">{showNav&&<Nav onNavigate={navigate}/>}{screen==="login"&&<LoginScreen onNavigate={navigate}/>}{screen==="signup"&&<SignupScreen onNavigate={navigate}/>}{screen==="dashboard"&&<DashboardScreen onNavigate={navigate}/>}{screen==="create"&&<CreateScreen onNavigate={navigate}/>}{screen==="detail"&&<DetailScreen onNavigate={navigate} params={params}/>}{screen==="join"&&<JoinScreen onNavigate={navigate} inviteCode={jc}/>}</div>;}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
